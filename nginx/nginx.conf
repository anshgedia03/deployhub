events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    server {
        listen 80;
        server_name localhost;

        # Frontend Next.js app
        location / {
            # Check if the referer indicates this is an asset request from a deployed project
            set $should_rewrite "";
            set $referer_project "";
            
            if ($http_referer ~* "^https?://[^/]+/([a-z0-9_-]+)") {
                set $referer_project $1;
                set $should_rewrite "Y";
            }
            
            # Don't rewrite dashboard system paths
            if ($uri ~* "^/(_next|api|projects|deploy)") {
                set $should_rewrite "";
            }
            
            # Don't rewrite if the URI already starts with the referer project name
            set $test_uri "${referer_project}:${uri}";
            if ($test_uri ~* "^([^:]+):/\1/") {
                set $should_rewrite "";
            }
            
            if ($should_rewrite = "Y") {
                rewrite ^/(.*)$ /$referer_project/$1 last;
            }

            proxy_pass http://host.docker.internal:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Backend API
        location /api/ {
            proxy_pass http://host.docker.internal:4000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # WebSocket support for socket.io
        location /socket.io/ {
            proxy_pass http://host.docker.internal:4000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
        # Include additional dynamically generated location blocks here
        include /etc/nginx/conf.d/*.conf;
    }
}
